<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Google Clone</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      background:white;
    }

    /* Top Navigation */

    .top-nav{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      padding:15px 25px;
      gap:20px;
      font-size:14px;
    }

    .top-nav a{
      text-decoration:none;
      color:#333;
    }

    .top-nav a:hover{
      text-decoration:underline;
    }

    .profile{
      width:35px;
      height:35px;
      border-radius:50%;
      background:#4a90e2;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-weight:bold;
      cursor:pointer;
    }

    /* Main Section */

    .main{
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-top:-120px;
    }

    .logo{
      font-size:90px;
      font-weight:bold;
      margin-bottom:25px;
      letter-spacing:-5px;
    }

    .blue{
      color:#4285F4;
    }

    .red{
      color:#EA4335;
    }

    .yellow{
      color:#FBBC05;
    }

    .green{
      color:#34A853;
    }

    /* Search Box */

    .search-box{
      width:90%;
      max-width:580px;
      border:1px solid #dcdcdc;
      border-radius:30px;
      padding:12px 20px;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow:0 1px 6px rgba(32,33,36,0.2);
    }

    .search-box input{
      flex:1;
      border:none;
      outline:none;
      font-size:16px;
    }

    /* Buttons */

    .buttons{
      margin-top:30px;
    }

    .buttons button{
      padding:10px 18px;
      margin:5px;
      border:none;
      background:#f8f9fa;
      border:1px solid #f8f9fa;
      border-radius:4px;
      cursor:pointer;
      font-size:14px;
    }

    .buttons button:hover{
      border:1px solid #c6c6c6;
    }

    /* Footer */

    footer{
      background:#f2f2f2;
      padding:15px 30px;
      font-size:14px;
      color:#555;
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .footer-links{
      display:flex;
      gap:20px;
    }

    .footer-links a{
      text-decoration:none;
      color:#555;
    }

    .footer-links a:hover{
      text-decoration:underline;
    }

    /* Responsive */

    @media(max-width:600px){

      .logo{
        font-size:65px;
      }

      footer{
        flex-direction:column;
        gap:10px;
        text-align:center;
      }

      .footer-links{
        justify-content:center;
      }

    }

  </style>
</head>

<body>

  <!-- Top Navigation -->

  <div class="top-nav">

    <a href="#">Gmail</a>
    <a href="#">Images</a>

    <div class="profile">
      U
    </div>

  </div>

  <!-- Main Section -->

  <div class="main">

    <!-- Google Logo -->

    <div class="logo">

      <span class="blue">G</span>
      <span class="red">o</span>
      <span class="yellow">o</span>
      <span class="blue">g</span>
      <span class="green">l</span>
      <span class="red">e</span>

    </div>

    <!-- Search Box -->

    <div class="search-box">

      🔍
      <input type="text" placeholder="Search Google or type a URL">
      🎤

    </div>

    <!-- Buttons -->

    <div class="buttons">

      <button>Google Search</button>
      <button>I'm Feeling Lucky</button>

    </div>

  </div>

  <!-- Footer -->

  <footer>

    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Advertising</a>
      <a href="#">Business</a>
    </div>

    <div class="footer-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Settings</a>
    </div>

  </footer>

</body>
</html>
